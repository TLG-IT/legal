<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TLG Global Legal Department</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
}

iframe {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    border: none;
}
</style>
</head>
<body>

<iframe
    id="site"
    src="https://analytics.zoho.com/ZDBSlideshow.cc?SLIDEID=2298565000025365609&SLIDEKEY=858880755f35f22028d65e3a60346d785c941b3491660260eb268e2475c6ab1c&INTERVAL=25&AUTOPLAY=true&INCLUDETITLE=true&INCLUDEDESC=true&SOCIALWIDGETS=false"
    allowfullscreen>
</iframe>

<script>
// Attempt fullscreen
async function goFullscreen() {
    try {
        if (!document.fullscreenElement) {
            await document.documentElement.requestFullscreen();
        }
    } catch(e) {}
}

window.onload = goFullscreen;

// Enter fullscreen on first click (required by many browsers)
document.addEventListener("click", goFullscreen, { once: true });

// Hide mouse cursor
let timer;
document.onmousemove = function () {
    document.body.style.cursor = "default";
    clearTimeout(timer);
    timer = setTimeout(() => {
        document.body.style.cursor = "none";
    }, 2000);
};
</script>

</body>
</html>
